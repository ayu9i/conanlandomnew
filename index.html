<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM UPDATE | APTX-4869</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Kanit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --hacker-green: #00ff41;
            --conan-red: #ff0000;
            --bg-black: #0a0a0a;
        }

        body {
            background-color: var(--bg-black);
            color: var(--hacker-green);
            font-family: 'Fira Code', 'Kanit', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        /* Matrix Rain Background (จำลอง) */
        .matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            font-size: 10px;
            color: rgba(0, 255, 65, 0.05);
            z-index: -1;
            overflow: hidden;
            user-select: none;
        }

        .container {
            border: 2px solid var(--hacker-green);
            padding: 40px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            max-width: 90%;
            position: relative;
        }

        .warning-label {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--conan-red);
            color: white;
            padding: 2px 20px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 3px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--hacker-green);
        }

        .glitch {
            color: var(--conan-red);
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .status-text {
            font-size: 1.1rem;
            margin: 20px 0;
            line-height: 1.6;
        }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: #222;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .loading-progress {
            width: 40%;
            height: 100%;
            background: var(--hacker-green);
            box-shadow: 0 0 10px var(--hacker-green);
            animation: load 3s infinite ease-in-out;
        }

        @keyframes load {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }

        .footer-code {
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="matrix-bg" id="matrix"></div>

<div class="container">
    <div class="warning-label">CRITICAL UPDATE</div>
    <h1>SYSTEM <span class="glitch">OFFLINE</span></h1>
    
    <div class="status-text">
        > กำลังระงับระบบสุ่มตอน...<br>
        <span style="color: #fff;">[ เว็บสุ่มตอนจะเปลี่ยนเป็นเว็บจำชื่อเลขตอนเร็วๆ นี้ ]</span><br>
        > กำลังเตรียมฐานข้อมูล APTX-4869...
    </div>

    <div class="loading-bar">
        <div class="loading-progress"></div>
    </div>

    <div class="footer-code">
        ERROR_CODE: BYPASS_CONAN_HUB_V4 // ACCESS_BY: AYU_HACKER
    </div>
</div>

<script>
    // สร้างเลขสุ่มพื้นหลังให้ดูเหมือน Hacker
    const matrix = document.getElementById('matrix');
    let content = "";
    for(let i=0; i<2000; i++) {
        content += Math.floor(Math.random() * 2);
        if(i % 50 === 0) content += "<br>";
    }
    matrix.innerHTML = content;

    // เปลี่ยนเลขไปเรื่อยๆ
    setInterval(() => {
        let newContent = "";
        for(let i=0; i<2000; i++) {
            newContent += Math.floor(Math.random() * 2);
            if(i % 50 === 0) newContent += "<br>";
        }
        matrix.innerHTML = newContent;
    }, 100);
</script>

</body>
</html>
