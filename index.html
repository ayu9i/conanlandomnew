<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APTX-4869 | Database Bypass</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --hacker-green: #00ff41;
            --dark-bg: #050505;
            --conan-red: #ff0000;
            --glass-green: rgba(0, 255, 65, 0.1);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--hacker-green);
            font-family: 'Fira Code', 'Kanit', monospace;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal-header {
            width: 100%;
            padding: 10px;
            background: #111;
            border-bottom: 1px solid var(--hacker-green);
            font-size: 0.8rem;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin-top: 30px;
            z-index: 10;
        }

        .status-box {
            border: 1px solid var(--hacker-green);
            padding: 15px;
            margin-bottom: 20px;
            background: var(--glass-green);
            box-shadow: 0 0 15px var(--glass-green);
        }

        .glitch-text {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--conan-red);
            text-shadow: 2px 0 var(--hacker-green);
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* Input Area */
        .input-section {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: #000;
            border: 1px solid var(--hacker-green);
            color: var(--hacker-green);
            padding: 12px;
            font-family: 'Fira Code', sans-serif;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: rgba(0, 255, 65, 0.3);
        }

        .btn-exe {
            background: var(--hacker-green);
            color: #000;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Kanit';
        }

        .btn-exe:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }

        /* Database Area */
        .db-title {
            margin-top: 30px;
            font-size: 0.9rem;
            border-left: 5px solid var(--conan-red);
            padding-left: 10px;
        }

        .log-list {
            margin-top: 15px;
            height: 400px;
            overflow-y: auto;
            border: 1px solid #222;
            padding: 10px;
            font-size: 0.85rem;
        }

        .log-item {
            padding: 8px;
            border-bottom: 1px solid #111;
            display: flex;
            justify-content: space-between;
            animation: fadeIn 0.5s ease;
        }

        .log-item span.time { color: #555; margin-right: 10px; }
        .log-item span.content { flex: 1; }
        .log-item .btn-del { color: var(--conan-red); cursor: pointer; margin-left: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--hacker-green); }
    </style>
</head>
<body>

<div class="terminal-header">
    SYSTEM STATUS: <span style="color: #fff;">CONNECTED</span> | USER: <span style="color: var(--hacker-green);">AYU_DEV</span>
</div>

<div class="container">
    <div class="status-box">
        <div class="glitch-text">ACCESS GRANTED: CONAN DATABASE V4.0</div>
        <p style="font-size: 0.7rem; opacity: 0.7; margin-top: 5px;">
            > เว็บสุ่มถูกทำลายแล้ว... <br>
            > เริ่มต้นระบบบันทึกฐานข้อมูลคดีแบบ Manual <br>
            > ป้องกันการติดตามจาก FBI และ CIA 
        </p>
    </div>

    <div class="input-section">
        <input type="text" id="caseInput" placeholder="กรอกชื่อตอน หรือ หมายเลขคดีที่นี่..." onkeypress="if(event.key === 'Enter') saveCase()">
        <button class="btn-exe" onclick="saveCase()">SAVE_DATA</button>
    </div>

    <div class="db-title">LOCAL_STORAGE / CASE_LOGS</div>
    <div class="log-list" id="logList">
        </div>

    <button onclick="clearDatabase()" style="background: none; border: 1px solid var(--conan-red); color: var(--conan-red); font-size: 0.7rem; margin-top: 20px; cursor: pointer; padding: 5px 10px;">
        WIPE ALL DATA (FORMAT)
    </button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('conan_hacker_db')) || [];

    function saveCase() {
        const input = document.getElementById('caseInput');
        const val = input.value.trim();
        
        if (val === "") return;

        const timestamp = new Date().toLocaleTimeString();
        const entry = {
            id: Date.now(),
            time: timestamp,
            text: val
        };

        db.unshift(entry);
        localStorage.setItem('conan_hacker_db', JSON.stringify(db));
        input.value = "";
        renderLogs();
    }

    function deleteCase(id) {
        db = db.filter(item => item.id !== id);
        localStorage.setItem('conan_hacker_db', JSON.stringify(db));
        renderLogs();
    }

    function clearDatabase() {
        if(confirm("ยืนยันการล้างข้อมูลทั้งหมด? ข้อมูลจะหายไปถาวร")) {
            db = [];
            localStorage.removeItem('conan_hacker_db');
            renderLogs();
        }
    }

    function renderLogs() {
        const list = document.getElementById('logList');
        if (db.length === 0) {
            list.innerHTML = '<div style="color:#333; text-align:center; margin-top:20px;">[ NO DATA FOUND ]</div>';
            return;
        }

        list.innerHTML = db.map(item => `
            <div class="log-item">
                <span class="time">[${item.time}]</span>
                <span class="content">> ${item.text}</span>
                <span class="btn-del" onclick="deleteCase(${item.id})">[DELETE]</span>
            </div>
        `).join('');
    }

    // Initialize
    renderLogs();
</script>

</body>
</html>
