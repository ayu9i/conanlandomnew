<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan Tracker - Admin Mode</title>
    <style>
        :root {
            --primary: #1a2a44;
            --accent: #d4af37;
            --bg: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            object-fit: cover;
        }

        h1 { margin-top: 15px; font-size: 1.5rem; color: var(--primary); }

        .stats {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 800px;
        }

        .episode-card {
            background: white;
            border: 2px solid #ddd;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
            font-weight: bold;
        }

        .episode-card.watched {
            background: var(--accent);
            color: white;
            border-color: #b8860b;
            text-decoration: line-through;
        }

        .episode-card:hover { transform: scale(1.05); }

        .footer { margin-top: 40px; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">
        <img src="2315.png" alt="Ayu Enngi Logo" class="logo">
        <h1>🕵️‍♂️ CONAN TRACKER <br><small>[ADMIN MODE]</small></h1>
    </div>

    <div class="stats" id="counter">Watched: 0 / 0</div>

    <div class="episode-grid" id="grid">
        </div>

    <div class="footer">Created by Ayu Enngi | Technical Tak</div>

    <script>
        // ดึงเลขตอนจากกระดาษโน้ตที่คุณถ่ายมา
        const episodes = [
            128, 614, 615, 616, 617, 564, 565, 566, 1147,
            637, 638, 807, 808, 809, 371, 372, 373, 374, 375,
            376, 377, 378, 379, 380, 381, 382, 383, 386, 
            387, 388, 733, 734, 735, 750, 982, 983,
            984, 945, 675, 676, 677, 680, 681, 682, 772,
            773, 774, 775, 776, 777, 993, 994, 995, 996,
            301, 302, 303, 300, 311, 312, 288, 289, 290, 291,
            292, 94, 95, 96, 120, 121, 196, 816, 817,
            818, 819, 820, 821, 822, 823, 824, 142,
            143, 144
        ].sort((a, b) => a - b); // เรียงเลขจากน้อยไปมาก

        const grid = document.getElementById('grid');
        const counter = document.getElementById('counter');
        
        // โหลดข้อมูลที่เคยติ๊กไว้
        let watchedList = JSON.parse(localStorage.getItem('conan_watched')) || [];

        function updateStats() {
            counter.innerText = `Watched: ${watchedList.length} / ${episodes.length}`;
        }

        function toggleEpisode(ep, element) {
            if (watchedList.includes(ep)) {
                watchedList = watchedList.filter(item => item !== ep);
                element.classList.remove('watched');
            } else {
                watchedList.push(ep);
                element.classList.add('watched');
            }
            localStorage.setItem('conan_watched', JSON.stringify(watchedList));
            updateStats();
        }

        // สร้างปุ่มตอนต่างๆ
        episodes.forEach(ep => {
            const div = document.createElement('div');
            div.className = 'episode-card';
            if (watchedList.includes(ep)) div.classList.add('watched');
            div.innerText = ep;
            div.onclick = () => toggleEpisode(ep, div);
            grid.appendChild(div);
        });

        updateStats();
    </script>
</body>
</html>
