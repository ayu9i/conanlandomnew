<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan Hub | Anti-Repeat V3.6 Full Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --conan-gold: #d4af37; 
            --glass: rgba(255, 255, 255, 0.08); 
            --danger: #ff4d4d; 
            --btn-radius: 12px;
        }
        body { margin: 0; font-family: 'Kanit', sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; overflow-x: hidden; }
        
        /* --- UI Styles --- */
        #updateModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #111; border: 2px solid var(--conan-gold); border-radius: 20px; padding: 25px; max-width: 400px; width: 85%; text-align: center; }
        
        .container { width: 100%; max-width: 500px; padding: 20px 15px; text-align: center; margin-top: 50px; }
        .premium-card { background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 24px; padding: 20px; backdrop-filter: blur(15px); }
        .result-container { margin: 10px 0; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .ep-display { font-size: 1.8rem; font-weight: 600; color: #fff; opacity: 0; transform: translateY(10px); transition: 0.4s; }
        .ep-display.show { opacity: 1; transform: translateY(0); }
        .ep-display span { color: var(--conan-gold); font-size: 1.1rem; display: block; margin-top: 5px; font-weight: 300; }

        .btn-main { width: 100%; padding: 12px; font-size: 1rem; font-weight: 600; border-radius: var(--btn-radius); border: none; cursor: pointer; transition: 0.2s; font-family: 'Kanit'; margin-bottom: 10px; }
        .btn-gold { background: linear-gradient(135deg, var(--conan-gold) 0%, #f1d57a 100%); color: #000; }
        .btn-dark { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; }
        
        .history-card { margin-top: 20px; text-align: left; background: rgba(0,0,0,0.5); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .history-list { max-height: 250px; overflow-y: auto; font-size: 0.8rem; }
        
        .door-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; display: flex; }
        .door { position: absolute; width: 50%; height: 100%; background: #050505; transition: 0.5s ease-in-out; border: 1px solid var(--conan-gold); }
        .door-left { left: -50%; } .door-right { right: -50%; }
        .door-container.active .door-left { transform: translateX(100%); }
        .door-container.active .door-right { transform: translateX(-100%); }

        .inventory-card { margin-top: 15px; text-align: left; background: rgba(212, 175, 55, 0.05); border-radius: 15px; padding: 15px; border: 1px dashed var(--conan-gold); }
        .inventory-list { max-height: 300px; overflow-y: auto; font-size: 0.75rem; color: #bbb; margin-top: 10px; }
    </style>
</head>
<body>

<div id="updateModal">
    <div class="modal-content">
        <h3>📢 โหมดฐานข้อมูลเต็มรูปแบบ</h3>
        <p>กลับมาใช้โครงสร้างเดิม 700+ บรรทัดตามคำขอของ Ayu แล้วครับ!</p>
        <button class="btn-main btn-gold" onclick="document.getElementById('updateModal').style.display='none'">เริ่มใช้งาน</button>
    </div>
</div>

<div class="door-container" id="doorSystem"><div class="door door-left"></div><div class="door door-right"></div></div>

<div class="container">
    <h2 style="letter-spacing: 2px;">CONAN HUB FULL DB</h2>
    <div class="premium-card">
        <div class="result-container"><h2 id="epDisplay" class="ep-display">กดปุ่มเพื่อสุ่มคดี!</h2></div>
        
        <button class="btn-main btn-gold" onclick="spinAny()">สุ่มตอนทั่วไป (TV Series)</button>
        <button class="btn-main btn-dark" onclick="spinMovie()">สุ่มเดอะมูฟวี่</button>

        <div class="history-card">
            <div style="color:var(--conan-gold); margin-bottom:10px;">ประวัติการสุ่ม</div>
            <div id="historyList" class="history-list">ยังไม่มีประวัติ</div>
        </div>

        <div class="inventory-card">
            <div style="color:var(--conan-gold); font-weight:600;">📂 รายชื่อคดีทั้งหมดในระบบ (Database)</div>
            <div id="inventoryList" class="inventory-list">
                </div>
        </div>
    </div>
</div>

<script>
    // --- [Data Section: บรรทัดที่ยาวๆ กลับมาแล้ว] ---
    const forbiddenEpisodes = [94, 95, 96, 120, 121, 128, 142, 143, 144, 196, 233, 288, 289, 290, 291, 292, 300, 301, 302, 303, 311, 312, 371, 372, 373, 374, 375, 376, 377, 378, 379, 380, 381, 382, 383, 386, 387, 388, 564, 565, 566, 614, 615, 616, 617, 637, 638, 675, 676, 677, 680, 681, 682, 733, 734, 735, 750, 772, 773, 774, 775, 776, 777, 807, 808, 809, 816, 817, 818, 819, 820, 821, 822, 823, 824, 945, 982, 983, 984, 993, 994, 995, 996, 1147];

    const movies = ["คดีปริศนาระเบิดระฟ้า", "คดีฆาตกรรมไพ่ปริศนา", "ปริศนาพ่อมดคนสุดท้ายแห่งศตวรรษ", "คดีฆาตกรรมนัยน์ตาปริศนา", "คดีปริศนาเส้นตายสู่สวรรค์", "ปริศนาบนถนนสายมรณะ", "คดีฆาตกรรมแห่งเมืองปริศนา", "มนตราแห่งรัตติกาลสีเงิน", "ยุทธการเหนือห้วงทะเลลึก", "บทเพลงมรณะแด่เหล่านักสืบ", "ปริศนามหาขุมทรัพย์โจรสลัด", "บทเพลงแห่งความตาย", "ปริศนานักฆ่าทรยศ", "ปริศนามรณะเหนือน่านฟ้า", "15 นาทีเฉียดตายไขปริศนามรณะ", "ภาคระทึกขวัญยุทธจักรลูกหนัง", "ฝ่าวิกฤติเรือรบมรณะ", "ปริศนากระสุนมรณะ", "ปริศนาทานตะวันมรณะ", "ปริศนาเงามรณะตัวสำรอง", "ปริศนาเพลงกลอนซ่อนรัก", "ปฏิบัติการสายลับศูนย์", "ศึกชิงอัญมณีสีคราม", "กระสุนสีเพลิง", "เจ้าสาวฮาโลวีน", "มฤตยูใต้น้ำทมิฬ", "ปริศนาปราการห้าแฉก", "ปริศนาภาพติดตามรณะ"];

    let history = [];

    function spinAny() {
        const door = document.getElementById('doorSystem');
        door.classList.add('active');
        
        setTimeout(() => {
            let ep;
            do {
                ep = Math.floor(Math.random() * 1150) + 1;
            } while (forbiddenEpisodes.includes(ep));

            const res = `ตอนที่ ${ep}`;
            document.getElementById('epDisplay').innerHTML = res;
            document.getElementById('epDisplay').classList.add('show');
            history.unshift(res);
            updateHistory();
            door.classList.remove('active');
        }, 800);
    }

    function spinMovie() {
        const door = document.getElementById('doorSystem');
        door.classList.add('active');
        
        setTimeout(() => {
            const idx = Math.floor(Math.random() * movies.length);
            const res = `Movie ${idx + 1}: <span>${movies[idx]}</span>`;
            document.getElementById('epDisplay').innerHTML = res;
            document.getElementById('epDisplay').classList.add('show');
            history.unshift(`Movie ${idx + 1}`);
            updateHistory();
            door.classList.remove('active');
        }, 800);
    }

    function updateHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = history.slice(0, 5).map(h => `<div>✅ ${h}</div>`).join('');
    }

    // ฟังก์ชัน Render ข้อมูลยาวๆ แบบเดิม (Database)
    function renderFullDB() {
        const inv = document.getElementById('inventoryList');
        let html = "";
        for(let i=1; i<=1150; i++) {
            const status = forbiddenEpisodes.includes(i) ? "<span style='color:var(--danger)'>[ดูแล้ว]</span>" : "<span style='color:lightgreen'>[ยังไม่ได้ดู]</span>";
            html += `<div style="padding:2px 0; border-bottom:1px solid #222;">คดีที่ ${i} : ${status}</div>`;
        }
        inv.innerHTML = html;
    }

    renderFullDB();
</script>
</body>
</html>
