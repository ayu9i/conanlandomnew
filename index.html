<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan Hub Ultimate | Slot Machine V3.7 (Big Data Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* [CSS Section - มากกว่า 200 บรรทัด] 
           ระบบดีไซน์แบบ Glassmorphism ผสมกับ Conan Theme
        */
        :root { 
            --conan-gold: #d4af37; 
            --conan-blue: #1e3a8a;
            --conan-red: #b91c1c;
            --glass: rgba(255, 255, 255, 0.08); 
            --danger: #ff4d4d; 
            --btn-radius: 12px;
            --panel-bg: #0f0f0f;
        }

        body { 
            margin: 0; 
            font-family: 'Kanit', sans-serif; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding-bottom: 100px; 
            overflow-x: hidden; 
        }

        /* Scrollbar Customization */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--conan-gold); border-radius: 10px; }

        /* Animation Keyframes */
        @keyframes shine { from { left: -100%; } to { left: 100%; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* UI Elements */
        #uiPanel { 
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%; 
            background: var(--panel-bg); border-right: 2px solid var(--conan-gold); 
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 30px 20px; box-sizing: border-box; box-shadow: 20px 0 50px rgba(0,0,0,0.8);
        }
        #uiPanel.active { left: 0; }

        .config-btn { 
            position: fixed; top: 20px; left: 20px; background: var(--conan-gold); 
            width: 50px; height: 50px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; cursor: pointer; 
            z-index: 1001; font-size: 24px; box-shadow: 0 0 20px var(--conan-gold);
            transition: 0.3s;
        }
        .config-btn:hover { transform: rotate(90deg); }

        .container { 
            width: 100%; max-width: 600px; padding: 40px 20px; text-align: center; 
            margin-top: 40px; position: relative; z-index: 5;
        }

        .main-header {
            font-size: 2.5rem; font-weight: 600; color: var(--conan-gold);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); margin-bottom: 30px;
            letter-spacing: 4px;
        }

        .premium-card { 
            background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 30px; padding: 30px; backdrop-filter: blur(20px); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Slot Machine Area */
        .slot-box {
            background: #000; border: 2px solid #222; border-radius: 20px;
            margin: 20px 0; height: 140px; overflow: hidden; position: relative;
        }
        .slot-box::before, .slot-box::after {
            content: ""; position: absolute; left: 0; width: 100%; height: 40px; z-index: 2;
        }
        .slot-box::before { top: 0; background: linear-gradient(to bottom, #000, transparent); }
        .slot-box::after { bottom: 0; background: linear-gradient(to top, #000, transparent); }

        .slot-wrapper { transition: 2s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .slot-unit {
            height: 140px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
            padding: 0 20px; box-sizing: border-box;
        }
        .slot-unit h3 { font-size: 1.4rem; margin: 0; color: #fff; }
        .slot-unit p { font-size: 0.9rem; color: var(--conan-gold); margin: 5px 0 0; font-weight: 300; }

        /* Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .action-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px; border-radius: var(--btn-radius);
            font-family: 'Kanit'; cursor: pointer; transition: 0.3s; font-weight: 400;
        }
        .action-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .btn-primary { 
            background: linear-gradient(135deg, var(--conan-gold), #b8860b); 
            color: #000; font-weight: 600; border: none;
        }
        .btn-primary:hover { box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        /* History & Inventory */
        .history-section {
            margin-top: 30px; text-align: left; background: rgba(0,0,0,0.4);
            border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .history-list { max-height: 300px; overflow-y: auto; margin-top: 15px; }
        .history-item {
            padding: 12px; border-bottom: 1px solid #222; display: flex;
            justify-content: space-between; align-items: center; font-size: 0.85rem;
        }
        .history-item:last-child { border-bottom: none; }
        .tag { 
            padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; 
            margin-left: 10px; background: var(--conan-gold); color: #000;
        }

        /* Chat System */
        #chatBtn {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background: var(--conan-gold); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 30px;
            cursor: pointer; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #chatBox {
            position: fixed; bottom: 110px; right: 30px; width: 350px; height: 500px;
            background: #111; border: 1px solid var(--conan-gold); border-radius: 20px;
            display: none; flex-direction: column; overflow: hidden; z-index: 1000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .chat-head { background: var(--conan-gold); color: #000; padding: 15px; font-weight: 600; }
        .chat-content { flex: 1; padding: 15px; overflow-y: auto; background: #0a0a0a; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 0.85rem; max-width: 80%; line-height: 1.5; }
        .msg.bot { background: #1a1a1a; align-self: flex-start; border: 1px solid #333; }
        .msg.user { background: var(--conan-gold); color: #000; align-self: flex-end; }

        /* Door Animation */
        .curtain-wall {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; display: flex;
        }
        .curtain { width: 50%; height: 100%; background: #000; transition: 0.6s ease-in-out; border: 1px solid var(--conan-gold); }
        .curtain-left { transform: translateX(-100%); }
        .curtain-right { transform: translateX(100%); }
        .curtain-wall.active .curtain-left { transform: translateX(0); }
        .curtain-wall.active .curtain-right { transform: translateX(0); }

        /* Responsive */
        @media (max-width: 600px) {
            .main-header { font-size: 1.8rem; }
            .btn-grid { grid-template-columns: 1fr; }
            #chatBox { width: 90%; right: 5%; }
        }
    </style>
</head>

            </div>
        </div>
    </div>
</div>

        "S13 ตอนที่ 667: คัมภีร์ของโฮล์ม (ลอนดอน)",
        "S20 ตอนที่ 982: ทัศนศึกษาสีแดง (การสารภาพรัก)"
    ]
};

const movieData = movieNames.map((name, index) => {
    return { id: index + 1, title: name };
});

// --- 2. System Variables ---
let history = JSON.parse(localStorage.getItem('conan_hub_history')) || [];
let isSpinning = false;

// --- 3. Core Logic Functions ---

// ฟังก์ชันล้างประวัติ
function clearHistory() {
    if(confirm("ต้องการล้างประวัติการสืบสวนทั้งหมดใช่หรือไม่?")) {
        history = [];
        updateHistoryUI();
        saveData();
        addBotMsg("ล้างประวัติเรียบร้อยแล้วค่ะ เริ่มต้นการสืบสวนใหม่ได้เลย!");
    }
}

// ฟังก์ชันเช็คการสุ่มซ้ำ (ปรับปรุงใหม่ให้แม่นยำ 100%)
function checkDuplicate(targetText) {
    const cleanTarget = targetText.replace(/\s+/g, '').trim();
    return history.some(item => item.text.replace(/\s+/g, '').trim() === cleanTarget);
}

// ระบบจัดการ Theme
function changeTheme(color) {
    document.documentElement.style.setProperty('--conan-gold', color);
    addBotMsg("ปรับเปลี่ยนโทนสีระบบเรียบร้อยแล้วค่ะ!");
}

function toggleUI() {
    document.getElementById('uiPanel').classList.toggle('active');
}

// ฟังก์ชันสุ่มหลัก (Process)
function spinProcess(type) {
    if (isSpinning) return;
    
    // เตรียมข้อมูลตามประเภท
    let pool = [];
    let result = "";
    let badgeText = "";

    if (type === 'all') {
        // รวมทุกอย่าง iQIYI + True + Movie
        const allTV = [...caseDatabase.iqiyi, ...caseDatabase.truevisions];
        const randomType = Math.random();
        if (randomType < 0.7) {
            const pick = allTV[Math.floor(Math.random() * allTV.length)];
            result = `ซีซั่น ${pick.s} ตอนที่ ${pick.ep}: ${pick.title}`;
            badgeText = pick.ep <= 993 ? "iQIYI [S1-19]" : "TrueVisions [S20-25]";
        } else {
            const pick = movieData[Math.floor(Math.random() * movieData.length)];
            result = `The Movie ${pick.id}: ${pick.title}`;
            badgeText = "เดอะมูฟวี่";
        }
    } else if (type === 'series') {
        const allTV = [...caseDatabase.iqiyi, ...caseDatabase.truevisions];
        const pick = allTV[Math.floor(Math.random() * allTV.length)];
        result = `ซีซั่น ${pick.s} ตอนที่ ${pick.ep}: ${pick.title}`;
        badgeText = pick.ep <= 993 ? "iQIYI [S1-19]" : "TrueVisions [S20-25]";
    } else if (type === 'movie') {
        const pick = movieData[Math.floor(Math.random() * movieData.length)];
        result = `The Movie ${pick.id}: ${pick.title}`;
        badgeText = "เดอะมูฟวี่";
    } else if (type === 'char') {
        const char = document.getElementById('charSelect').value;
        const charPool = charCases[char];
        const pick = charPool[Math.floor(Math.random() * charPool.length)];
        result = pick;
        badgeText = `หมวดตัวละคร: ${char.toUpperCase()}`;
    }

    // เช็คซ้ำ
    if (checkDuplicate(result)) {
        console.log("พบรายการซ้ำ กำลังสุ่มใหม่...");
        spinProcess(type); // Recursive call
        return;
    }

    executeSpinAnimation(result, badgeText);
}

// แอนิเมชั่น Slot Machine
function executeSpinAnimation(finalText, badge) {
    isSpinning = true;
    const wrapper = document.getElementById('slotWrapper');
    const curtain = document.getElementById('curtainWall');
    
    curtain.classList.add('active');
    
    setTimeout(() => {
        // สร้าง Dummy Data สำหรับหมุน
        const dummies = [
            {t: "ANALYZING EVIDENCE...", p: "SYSTEM"},
            {t: "SEARCHING DATABASE...", p: "V3.7"},
            {t: "INTERROGATING SUSPECT...", p: "DETECTIVE"},
            {t: "CRACKING THE CODE...", p: "CONAN"},
            {t: "SOLVING THE CASE...", p: "HUB"}
        ];

        let html = "";
        dummies.forEach(d => {
            html += `<div class="slot-unit"><h3>${d.t}</h3><p>${d.p}</p></div>`;
        });
        
        // ใส่ผลลัพธ์จริงไว้ท้ายสุด
        const splitText = finalText.split(': ');
        const mainTitle = splitText[0];
        const subTitle = splitText[1] || "";
        
        html += `<div class="slot-unit"><h3>${mainTitle}</h3><p>${subTitle}</p></div>`;
        
        wrapper.innerHTML = html;
        wrapper.style.transition = "none";
        wrapper.style.transform = "translateY(0)";
        wrapper.offsetHeight; // Force reflow
        
        wrapper.style.transition = "2s cubic-bezier(0.1, 0.7, 0.1, 1)";
        wrapper.style.transform = `translateY(-${dummies.length * 140}px)`;
        
        curtain.classList.remove('active');
        
        setTimeout(() => {
            document.getElementById('statusBadge').style.opacity = "1";
            document.getElementById('statusBadge').innerText = badge;
            addToHistory(finalText, badge);
            isSpinning = false;
        }, 2100);
        
    }, 600);
}

// --- 4. UI Updates & Helpers ---

function addToHistory(text, tag) {
    history.unshift({ id: Date.now(), text: text, tag: tag });
    if (history.length > 100) history.pop(); // เก็บสูงสุด 100 รายการ
    updateHistoryUI();
    saveData();
}

function updateHistoryUI() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:20px; opacity:0.3; font-size:0.8rem;">ยังไม่มีประวัติการสืบสวน</div>`;
        return;
    }
    
    list.innerHTML = history.map(item => `
        <div class="history-item">
            <span>${item.text} <span class="tag">${item.tag}</span></span>
            <span onclick="removeHistoryItem(${item.id})" style="cursor:pointer; color:var(--danger)">🗑️</span>
        </div>
    `).join('');
}

function removeHistoryItem(id) {
    history = history.filter(item => item.id !== id);
    updateHistoryUI();
    saveData();
}

function saveData() {
    localStorage.setItem('conan_hub_history', JSON.stringify(history));
}

// --- 5. Chatbot Logic ---

function toggleChat() {
    const box = document.getElementById('chatBox');
    box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
}

function addBotMsg(text) {
    const content = document.getElementById('chatContent');
    content.innerHTML += `<div class="msg bot">${text}</div>`;
    content.scrollTop = content.scrollHeight;
}

function sendChat() {
    const input = document.getElementById('chatInput');
    const val = input.value.trim();
    if (!val) return;

    const content = document.getElementById('chatContent');
    content.innerHTML += `<div class="msg user">${val}</div>`;
    input.value = "";
    
    // Simple Chat Logic (สามารถขยายบรรทัดเพิ่มได้ที่นี่)
    setTimeout(() => {
        let reply = "ขอโทษทีค่ะ คดีนี้ไม่อยู่ในฐานข้อมูลปัจจุบัน ลองถามเรื่อง 'องค์กรชุดดำ' หรือ 'สุ่มตอน' ดูไหมคะ?";
        
        if (val.includes("สุ่ม")) reply = "คุณ Ayu สามารถกดปุ่มสุ่มที่หน้าจอหลักได้เลยค่ะ มีทั้งแบบสุ่มรวมและสุ่มแยกตามตัวละครนะคะ!";
        if (val.includes("องค์กรชุดดำ")) reply = "องค์กรชุดดำคือกลุ่มอาชญากรลึกลับที่ทำให้ชินอิจิตัวเล็กลงค่ะ สนใจสุ่มดูคดีของพวกเขาไหมคะ?";
        if (val.includes("ใครคือรัม")) reply = "ตัวจริงของ RUM คือ วากิตะ คาเนะโนริ พ่อครัวร้านซูชิข้างสำนักงานนักสืบโมริค่ะ!";
        
        addBotMsg(reply);
    }, 600);
}

// Initialize
updateHistoryUI();

</script>
