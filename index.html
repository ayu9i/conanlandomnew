<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONAN ULTIMATE DATABASE V.2026 - AYU EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        /* --- [SYSTEM CONFIG & STYLING] --- */
        :root {
            --gold: #d4af37; --bg: #05080a; --card: #10141d;
            --danger: #ff4d4d; --success: #4dff88; --info: #4da6ff;
            --white: #ffffff; --gray: #666; --dark-blue: #0a1016;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        body {
            margin: 0; font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--white);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(77, 166, 255, 0.05) 0%, transparent 20%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 10px;
        }

        .container { width: 100%; max-width: 500px; }

        /* --- [HEADER & KARMA] --- */
        .master-header { text-align: center; margin-bottom: 30px; }
        .logo-glitch { 
            font-size: 2rem; color: var(--gold); font-weight: 600; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 2px 2px #000; position: relative;
        }

        .karma-wrapper { 
            background: var(--card); padding: 20px; border-radius: 30px; 
            border: 1px solid rgba(212,175,55,0.2); margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .bar-bg { background: #000; height: 16px; border-radius: 8px; border: 1px solid #222; overflow: hidden; }
        #karmaFill { 
            height: 100%; width: 100%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); 
            background: linear-gradient(90deg, var(--gold), var(--success)); 
        }
        .karma-meta { display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 10px; }

        /* --- [DASHBOARD] --- */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { 
            background: var(--card); padding: 15px; border-radius: 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-val { font-size: 1.5rem; color: var(--gold); font-weight: 600; display: block; }
        .stat-label { font-size: 0.7rem; color: var(--gray); text-transform: uppercase; }

        /* --- [INPUT & ACTIONS] --- */
        .action-card { background: var(--card); padding: 25px; border-radius: 30px; margin-bottom: 25px; }
        input {
            width: 100%; background: #000; border: 2px solid #1a1a1a; color: var(--gold);
            padding: 18px; border-radius: 18px; font-family: 'Kanit'; font-size: 1.1rem;
            margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.1); }
        .btn-main {
            width: 100%; background: var(--gold); color: #000; padding: 18px;
            border-radius: 18px; border: none; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 #8a6d21;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #8a6d21; }

        /* --- [LIST SECTION] --- */
        .list-container { 
            background: rgba(0,0,0,0.3); border-radius: 35px; border: 1px solid #1a1a1a; 
            padding: 15px; height: 500px; display: flex; flex-direction: column;
        }
        .search-box { margin-bottom: 15px; padding: 10px; background: #000; border-radius: 15px; border: 1px solid #333; color: white; width: 100%; }
        .list-box { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .ep-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.02);
            transition: 0.3s; border-radius: 15px; margin-bottom: 5px;
        }
        .ep-row:hover { background: rgba(255,255,255,0.03); }
        .tag { font-size: 0.7rem; padding: 5px 12px; border-radius: 10px; font-weight: 600; }
        .tag-done { background: rgba(255, 77, 77, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .tag-yet { background: rgba(77, 255, 136, 0.05); color: var(--success); border: 1px solid var(--success); }

        /* --- [MODALS] --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .modal { background: var(--card); padding: 40px; border-radius: 40px; border: 2px solid var(--gold); width: 90%; max-width: 400px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" class="overlay">
    <div class="modal">
        <h2 style="color: var(--gold);">CONAN SECURE ACCESS</h2>
        <p style="color: var(--gray); font-size: 0.8rem;">กรุณายืนยันตัวตนก่อนเข้าสู่ระบบ Ayu DB</p>
        <input type="text" id="u" placeholder="ชื่อผู้ใช้งาน...">
        <input type="password" id="p" placeholder="รหัสผ่านลับ...">
        <button class="btn-main" onclick="sysLogin()">UNLOCK SYSTEM 🔓</button>
    </div>
</div>

<div class="container">
    <header class="master-header">
        <div class="logo-glitch">CONAN SUPREME</div>
        <div class="karma-wrapper">
            <div class="bar-bg"><div id="karmaFill"></div></div>
            <div class="karma-meta">
                <span id="sysRank">RANK: นักสืบฝึกหัด</span>
                <span>KARMA: <b id="sysKarma">100</b> / 100</span>
            </div>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="stat-card">
            <span class="stat-val" id="statCount">0</span>
            <span class="stat-label">คดีที่ปิดแล้ว</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="statPerc">0%</span>
            <span class="stat-label">Progress</span>
        </div>
    </div>

    <div class="action-card">
        <label style="font-size: 0.7rem; color: var(--gray); margin-bottom: 8px; display: block;">DATABASE INPUT CENTER</label>
        <input type="number" id="newEp" placeholder="กรอกหมายเลขตอนที่จบแล้ว...">
        <button class="btn-main" onclick="saveEp()">บันทึกข้อมูลลงฐานข้อมูล 💾</button>
    </div>

    <div class="list-container">
        <input type="text" class="search-box" id="search" placeholder="ค้นหาตอน..." onkeyup="filterList()">
        <div class="list-box" id="mainList"></div>
    </div>

    <footer style="margin-top: 30px; text-align: center;">
        <button onclick="factoryReset()" style="background:none; border:none; color:#333; font-size:0.7rem; cursor:pointer;">ERASE ALL LOCAL STORAGE</button>
        <p style="color:#222; font-size: 0.6rem; margin-top: 10px;">V.2026.04.28-ULTRA | DEVELOPED FOR AYU</p>
    </footer>
</div>

<script>
    /* -----------------------------------------------------------
       [AYU'S MASTER DATA - DO NOT DELETE]
       รายชื่อตอนที่จดไว้ในกระดาษ (EA59) และข้อมูลจากภาพถ่าย
       ----------------------------------------------------------- */
    const RAW_DATA = [
        128, 614, 615, 616, 617, 564, 565, 566, 1147, 637, 638, 807, 808, 809, 
        371, 372, 373, 374, 375, 376, 377, 378, 379, 380, 381, 382, 383, 386, 387, 388, 
        233, 734, 735, 750, 982, 983, 984, 945, 675, 676, 677, 680, 681, 642, 272, 
        773, 774, 775, 776, 777, 993, 994, 995, 996, 301, 302, 303, 360, 311, 312, 
        288, 289, 290, 291, 292, 94, 95, 96, 120, 121, 196, 816, 817, 818, 819, 820, 
        821, 822, 823, 824, 142, 143, 144, 145, 146, 147, 402, 403
    ];

    const MAX_EP = 1150;
    let karma = parseInt(localStorage.getItem('ayu_karma_u')) || 100;
    let watched = JSON.parse(localStorage.getItem('ayu_watched_u')) || RAW_DATA;

    // ระบบป้องกัน NaN ขั้นสูงสุด
    if(isNaN(karma)) karma = 100; [cite: 2026-04-28]

    window.onload = () => {
        if(localStorage.getItem('ayu_auth') === 'true') {
            document.getElementById('loginGate').classList.add('hidden');
            initSystem();
        }
    };

    function sysLogin() {
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        if(u && p) {
            localStorage.setItem('ayu_auth', 'true');
            location.reload();
        }
    }

    function initSystem() {
        renderList();
        updateDisplay();
    }

    function updateDisplay() {
        if(isNaN(karma)) karma = 100; [cite: 2026-04-28]
        if(karma > 100) karma = 100;
        localStorage.setItem('ayu_karma_u', karma);

        document.getElementById('sysKarma').innerText = karma;
        const fill = document.getElementById('karmaFill');
        fill.style.width = karma + "%";

        // Dynamic Color Logic
        if(karma < 30) fill.style.background = "var(--danger)";
        else if(karma < 70) fill.style.background = "var(--gold)";
        else fill.style.background = "linear-gradient(90deg, var(--gold), var(--success))";

        document.getElementById('statCount').innerText = watched.length;
        document.getElementById('statPerc').innerText = ((watched.length/MAX_EP)*100).toFixed(1) + "%";
        
        // Rank System
        const rank = document.getElementById('sysRank');
        const p = (watched.length/MAX_EP)*100;
        if(p > 80) rank.innerText = "RANK: ยอดนักสืบในตำนาน";
        else if(p > 50) rank.innerText = "RANK: นักสืบมือโปร";
        else if(p > 20) rank.innerText = "RANK: ผู้ช่วยสารวัตร";
        else rank.innerText = "RANK: นักสืบฝึกหัด";
    }

    function renderList() {
        const list = document.getElementById('mainList');
        list.innerHTML = "";
        const frag = document.createDocumentFragment();
        
        for(let i=1; i<=MAX_EP; i++) {
            const seen = watched.includes(i);
            const row = document.createElement('div');
            row.className = 'ep-row';
            row.id = `case-${i}`;
            row.innerHTML = `
                <div>
                    <span style="color:var(--gray); font-size:0.6rem; font-family:'JetBrains Mono';">#${String(i).padStart(4,'0')}</span>
                    <div style="font-weight:400; font-size:0.9rem;">คดีตอนที่ ${i}</div>
                </div>
                <span class="tag ${seen ? 'tag-done' : 'tag-yet'}">${seen ? 'ปิดคดีแล้ว' : 'ยังไม่พบ'}</span>
            `;
            frag.appendChild(row);
        }
        list.appendChild(frag);
        localStorage.setItem('ayu_watched_u', JSON.stringify(watched));
    }

    function saveEp() {
        const input = document.getElementById('newEp');
        const val = parseInt(input.value);

        if(val > 0 && val <= MAX_EP && !watched.includes(val)) {
            watched.push(val);
            watched.sort((a,b) => a-b);
            renderList();
            updateDisplay();
            input.value = "";
            const target = document.getElementById(`case-${val}`);
            target.scrollIntoView({behavior:'smooth', block:'center'});
            target.style.background = "rgba(212,175,55,0.2)";
            setTimeout(() => target.style.background = "transparent", 2000);
        } else {
            karma -= 15; [cite: 2026-04-28]
            updateDisplay();
            alert("⚠️ SYSTEM ERROR: ข้อมูลซ้ำหรือรูปแบบไม่ถูกต้อง (หัก 15 แต้มความดี)");
        }
    }

    function filterList() {
        const q = document.getElementById('search').value.toLowerCase();
        const rows = document.getElementsByClassName('ep-row');
        for(let r of rows) {
            r.style.display = r.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        }
    }

    function factoryReset() {
        if(confirm("คำเตือน: ข้อมูลทั้งหมดจะถูกทำลายทิ้งและไม่สามารถกู้คืนได้ ต้องการดำเนินการต่อหรือไม่?")) {
            localStorage.clear();
            location.reload();
        }
    }

    /* -----------------------------------------------------------
       [LOGIC NOTE FOR AYU]
       เค้าแก้บัค NaN ให้แบบถาวรแล้วนะอาวุ ในบรรทัดที่ 162 และ 183
       ถ้าเผลอไปกดลบข้อมูล แต้มความดีจะรีเซ็ตกลับมาที่ 100 เสมอ
       ส่วนรายชื่อตอนที่จดไว้ในกระดาษ อยู่ใน RAW_DATA ครบทุกตอนครับ!
       ----------------------------------------------------------- */
</script>
</body>
</html>
