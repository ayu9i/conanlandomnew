<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONAN DATABASE - AYU EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0e14; --card: #151b23; --danger: #ff4d4d; --success: #4dff88; }
        body { margin: 0; font-family: 'Kanit', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        .container { width: 100%; max-width: 450px; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        /* ระบบตัวนับ */
        .counter-card { background: var(--gold); color: black; border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 600; }

        /* ระบบบันทึกและค้นหา */
        .input-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(212, 175, 55, 0.3); }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; opacity: 0.7; }
        input { width: 100%; background: #000; border: 1px solid #333; color: var(--gold); padding: 12px; border-radius: 10px; font-family: 'Kanit'; font-size: 1.1rem; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .btn-add { width: 100%; background: var(--gold); color: black; padding: 12px; border-radius: 10px; border: none; font-family: 'Kanit'; font-weight: 600; cursor: pointer; }
        #statusMsg { margin-top: 10px; text-align: center; font-size: 0.9rem; min-height: 25px; }

        /* รายการ Database */
        .list-box { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; margin-top: 20px; max-height: 500px; overflow-y: auto; border: 1px solid #222; }
        .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .tag-done { color: var(--danger); font-weight: 600; }
        .tag-not { color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 1.5rem;">CONAN MEMORY SYSTEM</h1>
        <div style="font-size: 0.8rem; color: var(--gold);">Admin Control: Ayu</div>
    </div>

    <div class="counter-card">
        <span>📋 ดูไปแล้วทั้งหมด</span>
        <span id="watchCount">0 / 1150</span>
    </div>

    <div class="input-card">
        <label>🔢 ใส่เลขตอนที่ดูจบแล้ว</label>
        <input type="number" id="epInput" placeholder="ตัวอย่าง: 144" onkeypress="if(event.key==='Enter') addMemory()">
        <button class="btn-add" onclick="addMemory()">บันทึกว่าดูแล้ว ✅</button>
        <div id="statusMsg"></div>
    </div>

    <div class="list-box">
        <div style="color: var(--gold); margin-bottom: 15px; font-size: 1rem; font-weight: 600; border-bottom: 1px solid var(--gold); padding-bottom: 5px;">📂 รายชื่อคดีทั้งหมด (1-1150)</div>
        <div id="dbList"></div>
    </div>
</div>

<script>
    // ฐานข้อมูลเดิมของอาวุจากรูปกระดาษ
    let watched = [94, 95, 96, 120, 121, 128, 142, 143, 144, 196, 233, 288, 289, 290, 291, 292, 300, 301, 302, 303, 311, 312, 371, 372, 373, 374, 375, 376, 377, 378, 379, 380, 381, 382, 383, 386, 387, 388, 564, 565, 566, 614, 615, 616, 617, 637, 638, 675, 676, 677, 680, 681, 682, 733, 734, 735, 750, 772, 773, 774, 775, 776, 777, 807, 808, 809, 816, 817, 818, 819, 820, 821, 822, 823, 824, 945, 982, 983, 984, 993, 994, 995, 996, 1147];

    function addMemory() {
        const input = document.getElementById('epInput');
        const val = parseInt(input.value);
        const msg = document.getElementById('statusMsg');

        if (!val || val < 1 || val > 1150) {
            msg.innerText = "❌ กรุณาใส่เลขตอน 1-1150 นะอาวุ";
            msg.style.color = "var(--danger)";
            return;
        }

        if (watched.includes(val)) {
            msg.innerText = `⚠️ ตอนที่ ${val} มีในระบบอยู่แล้วครับ!`;
            msg.style.color = "orange";
        } else {
            watched.push(val);
            watched.sort((a, b) => a - b); // เรียงเลขใหม่
            msg.innerText = `✅ เพิ่มตอนที่ ${val} เข้าสู่ระบบสำเร็จ!`;
            msg.style.color = "var(--success)";
            updateAll();
        }
        input.value = "";
    }

    function updateAll() {
        // อัปเดตตัวนับ
        document.getElementById('watchCount').innerText = `${watched.length} / 1150`;
        
        // อัปเดตรายการ
        const list = document.getElementById('dbList');
        let html = "";
        for(let i=1; i<=1150; i++) {
            const isDone = watched.includes(i);
            html += `<div class="item" id="ep-${i}">
                <span>คดีที่ ${i}</span>
                <span class="${isDone ? 'tag-done' : 'tag-not'}">${isDone ? '[ดูแล้ว]' : '[ยังไม่ได้ดู]'}</span>
            </div>`;
        }
        list.innerHTML = html;
        
        // ถ้ามีการเพิ่มตอน ให้เลื่อนไปดูภาวะล่าสุด
        const lastInput = parseInt(document.getElementById('epInput').value);
        if(lastInput) {
            const el = document.getElementById(`ep-${lastInput}`);
            if(el) el.scrollIntoView({ behavior: "smooth", block: "center" });
        }
    }

    // เริ่มทำงานครั้งแรก
    updateAll();
</script>
</body>
</html>
