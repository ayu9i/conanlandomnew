<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan Hub | Slot Machine V3.6 Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --conan-gold: #d4af37; 
            --glass: rgba(255, 255, 255, 0.08); 
            --danger: #ff4d4d; 
            --btn-radius: 12px;
        }
        body { margin: 0; font-family: 'Kanit', sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; overflow-x: hidden; }
        
        /* --- UI Panels --- */
        #uiPanel { position: fixed; top: 0; left: -300px; width: 260px; height: 100%; background: #111; border-right: 2px solid var(--conan-gold); z-index: 1002; transition: 0.3s; padding: 20px; box-sizing: border-box; }
        #uiPanel.active { left: 0; }
        .config-btn { position: fixed; top: 20px; left: 20px; background: var(--conan-gold); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; font-size: 20px; box-shadow: 0 0 15px var(--conan-gold); }
        .panel-title { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; font-weight: 600; color: var(--conan-gold); }
        .setting-item { margin-bottom: 15px; text-align: left; }
        .setting-item label { display: block; font-size: 0.8rem; margin-bottom: 5px; opacity: 0.8; }

        #updateModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #111; border: 2px solid var(--conan-gold); border-radius: 20px; padding: 25px; max-width: 400px; width: 85%; text-align: center; }
        .update-list { text-align: left; font-size: 0.8rem; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin: 15px 0; line-height: 1.5; }
        
        .container { width: 100%; max-width: 500px; padding: 20px 15px; text-align: center; transition: max-width 0.3s; margin-top: 50px; }
        .btn-group-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        
        @media (min-width: 768px) {
            .container { max-width: 800px; }
            .btn-group-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .premium-card { background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 24px; padding: 20px; backdrop-filter: blur(15px); }
        
        /* --- Slot Effect --- */
        .result-container { margin: 10px 0; height: 120px; overflow: hidden; position: relative; background: rgba(0,0,0,0.3); border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .slot-wrapper { display: flex; flex-direction: column; align-items: center; transition: transform 1.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .slot-item { height: 120px; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 600; width: 100%; text-align: center; color: #fff; padding: 0 10px; box-sizing: border-box; }
        .slot-item span { color: var(--conan-gold); font-size: 0.85rem; display: block; margin-top: 5px; font-weight: 300; }

        .info-badge { display: inline-block; padding: 4px 12px; background: rgba(212, 175, 55, 0.1); border: 1px solid var(--conan-gold); border-radius: 50px; font-size: 0.75rem; color: var(--conan-gold); margin-bottom: 5px; opacity: 0; transition: 0.3s; }
        .info-badge.show { opacity: 1; }

        .btn-main { width: 100%; padding: 12px; font-size: 1rem; font-weight: 600; border-radius: var(--btn-radius); border: none; cursor: pointer; transition: 0.2s; font-family: 'Kanit'; }
        .btn-gold { background: linear-gradient(135deg, var(--conan-gold) 0%, #f1d57a 100%); color: #000; }
        .btn-dark { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; }
        
        .history-card { margin-top: 20px; text-align: left; background: rgba(0,0,0,0.5); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .history-title { font-size: 0.85rem; color: var(--conan-gold); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .history-list { max-height: 250px; overflow-y: auto; font-size: 0.75rem; }
        .history-item { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .history-item.checked span:first-child { text-decoration: line-through; opacity: 0.4; }
        .btn-del { color: var(--danger); cursor: pointer; font-size: 1.1rem; margin-left: 10px; }
        
        .door-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; display: flex; }
        .door { position: absolute; width: 50%; height: 100%; background: #050505; transition: 0.5s ease-in-out; border: 1px solid var(--conan-gold); }
        .door-left { left: -50%; } .door-right { right: -50%; }
        .door-container.active .door-left { transform: translateX(100%); }
        .door-container.active .door-right { transform: translateX(-100%); }
        
        select { background: #111; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; width: 100%; font-family: 'Kanit'; }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--conan-gold); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div class="config-btn" onclick="toggleUIPanel()">⚙️</div>
<div id="uiPanel">
    <div class="panel-title">ปรับแต่ง UI</div>
    <div class="setting-item">
        <label>Theme Color</label>
        <select onchange="updateTheme(this.value)">
            <option value="#d4af37">Gold (Classic)</option>
            <option value="#37a6d4">Blue (Detective)</option>
            <option value="#d43737">Red (Criminal)</option>
            <option value="#37d45d">Green (Acid)</option>
        </select>
    </div>
    <div class="setting-item">
        <label>Button Roundness</label>
        <input type="range" min="0" max="30" value="12" oninput="updateRadius(this.value)">
    </div>
    <button class="btn-main btn-gold" onclick="toggleUIPanel()" style="margin-top:20px;">ปิดตั้งค่า</button>
</div>

<div id="updateModal">
    <div class="modal-content">
        <h3>📢 อัปเดต V3.6 (S1-S25 Full)</h3>
        <div class="update-list">
            • <b>iQIYI:</b> รองรับซีซั่น 1-19 (ตอนที่ 1-993)<br>
            • <b>TrueVisions:</b> รองรับซีซั่น 20-25 (ตอนที่ 994-1280+)<br>
            • <b>Character Guide:</b> สุ่มตามตัวละครพร้อมชื่อตอน
        </div>
        <button class="btn-main btn-gold" onclick="closeModal()">เริ่มสืบคดี!</button>
    </div>
</div>

<div class="door-container" id="doorSystem"><div class="door door-left"></div><div class="door door-right"></div></div>

<div class="container">
    <h2 id="mainTitle" style="letter-spacing: 2px;">CONAN HUB</h2>
    <div class="premium-card">
        <div id="badge" class="info-badge">พร้อมสืบคดี...</div>
        
        <div class="result-container">
            <div id="slotWrapper" class="slot-wrapper">
                <div class="slot-item">เลือกระบบสุ่มด้านล่าง</div>
            </div>
        </div>
        
        <div class="btn-group-grid">
            <button class="btn-main btn-gold" style="grid-column: span 2;" onclick="spinEverything()">สุ่มทุกอย่าง (All In)</button>
            <button class="btn-main btn-dark" style="grid-column: span 2;" onclick="spinSeries()">สุ่มตอนทั่วไป (S1-25)</button>
        </div>

        <div class="btn-group-grid">
            <button class="btn-main btn-dark" onclick="spinMovie()">มูฟวี่ 1-28</button>
            <button class="btn-main btn-dark" onclick="spinLupin()">ปะทะ ลูแปง</button>
        </div>

        <div class="btn-group-grid">
            <div style="grid-column: span 2;">
                <select id="charSelect">
                    <option value="black_org">💀 องค์กรชุดดำ</option>
                    <option value="kid">จอมโจรคิด 🎩</option>
                    <option value="ai">ไฮบาระ ไอ 🧪</option>
                    <option value="amuro">อามุโร่ ☕</option>
                    <option value="akai">อากาอิ 🔫</option>
                    <option value="shinichi">คุโด้ ชินอิจิ ⚽</option>
                    <option value="makoto">เคียวโกกุ มาโคโตะ 🥋</option>
                </select>
            </div>
            <button class="btn-main" style="background:none; border:1px solid var(--conan-gold); color:white; grid-column: span 2;" onclick="spinChar()">สุ่มคดีตัวละคร</button>
        </div>

        <div class="history-card">
            <div class="history-title">ประวัติการดู <span onclick="clearAllHistory()" style="cursor:pointer; opacity:0.6;">[ล้างประวัติ]</span></div>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>
</div>

<script>
    // --- [Data & Logic] ---
    const movieNames = ["คดีปริศนาระเบิดระฟ้า", "คดีฆาตกรรมไพ่ปริศนา", "ปริศนาพ่อมดคนสุดท้ายแห่งศตวรรษ", "คดีฆาตกรรมนัยน์ตาปริศนา", "คดีปริศนาเส้นตายสู่สวรรค์", "ปริศนาบนถนนสายมรณะ", "คดีฆาตกรรมแห่งเมืองปริศนา", "มนตราแห่งรัตติกาลสีเงิน", "ยุทธการเหนือห้วงทะเลลึก", "บทเพลงมรณะแด่เหล่าเหล่านักสืบ", "ปริศนามหาขุมทรัพย์โจรสลัด", "บทเพลงแห่งความตาย", "ปริศนานักฆ่าทรยศ", "ปริศนามรณะเหนือน่านฟ้า", "15 นาทีเฉียดตายไขปริศนามรณะ", "ภาคระทึกขวัญยุทธจักรลูกหนัง", "ฝ่าวิกฤติเรือรบมรณะ", "ปริศนากระสุนมรณะ", "ปริศนาทานตะวันมรณะ", "ปริศนาเงามรณะตัวสำรอง", "ปริศนาเพลงกลอนซ่อนรัก", "ปฏิบัติการสายลับศูนย์", "ศึกชิงอัญมณีสีคราม", "กระสุนสีเพลิง", "เจ้าสาวฮาโลวีน", "มฤตยูใต้น้ำทมิฬ", "ปริศนาปราการห้าแฉก", "ปริศนาภาพติดตามรณะ"];
    
    const charData = { 
        black_org: [
            "S1 ตอนที่ 1: คดีรถไฟเหาะ (ยีน/ว็อดก้า)", "S3 ตอนที่ 135: คดีฆาตกรรมศาสตราจารย์มหาวิทยาลัย (ไฮบาระปรากฏตัว)", "S4 ตอนที่ 190: การคืนชีพที่เสี่ยงตาย", "S6 ตอนที่ 249: ผู้มาจากชิคาโก้", "S8 ตอนที่ 371: การปะทะครั้งเผชิญหน้ากับองค์กรชุดดำ", "S11 ตอนที่ 538: ดำปะทะแดงเดือด", "S15 ตอนที่ 753: รถด่วนสีดำ (Mystery Train)", "S17 ตอนที่ 832: ความจริงของสีแดง", "S21 ตอนที่ 1131: งานเลี้ยงดำเนินไปสู่ความตาย (รัมเคลื่อนไหว)"
        ],
        kid: [
            "S2 ตอนที่ 78: จอมโจรคิดปะทะโคนัน", "S3 ตอนที่ 142: คดีฆาตกรรมคนรักมายากล", "S5 ตอนที่ 235: รวมพลยอดนักสืบ", "S8 ตอนที่ 386: การเดินกลางเวหาของจอมโจรคิด", "S11 ตอนที่ 562: เคล็ดลับการวาร์ป", "S16 ตอนที่ 776: จอมโจรคิดปะทะเคียวโกกุ มาโคโตะ", "S20 ตอนที่ 1039: จอมโจรคิดกับกล่องโชว์เคส"
        ],
        ai: [
            "S3 ตอนที่ 136: ผู้หญิงที่มาจากองค์กรชุดดำ", "S4 ตอนที่ 148: คดีฆาตกรรมในสนามแข่งรถ", "S7 ตอนที่ 301: ขบวนพาเหรดของความชั่วร้าย", "S13 ตอนที่ 648: ความลับของไฮบาระ ไอ", "S18 ตอนที่ 899: แก๊งนักสืบเยาวชนในความมืด", "S22 ตอนที่ 1145: ความแค้นของไฮบาระ"
        ],
        amuro: [
            "S15 ตอนที่ 719: เวดดิ้งอีฟ", "S15 ตอนที่ 753: รถด่วนทมิฬ", "S17 ตอนที่ 823: เบอร์เบินเคลื่อนไหว", "S17 ตอนที่ 832: คดีพัวพันสีแดง", "S19 ตอนที่ 936: เป้าหมายคืออามุโร่", "S21 ตอนที่ 1110: ตัวตนที่แท้จริงของอามุโร่"
        ],
        akai: [
            "S6 ตอนที่ 249: ชายผู้อยู่เบื้องหลัง", "S7 ตอนที่ 309: คดีรอยยิ้มอากาอิ", "S11 ตอนที่ 538: จุดจบของอากาอิ", "S17 ตอนที่ 833: การกลับมาของอากาอิ", "S21 ตอนที่ 1092: กระสุนที่เป็นหนึ่งเดียว"
        ],
        shinichi: [
            "S1 ตอนที่ 1: คดีรถไฟเหาะ", "S4 ตอนที่ 174: การคืนชีพที่สิ้นหวัง", "S6 ตอนที่ 312: คุโด้ ชินอิจิ กับคดีที่นิวยอร์ก", "S13 ตอนที่ 667: คัมภีร์ของโฮล์ม", "S20 ตอนที่ 982: ทัศนศึกษาสีแดง (ภาคคนรัก)"
        ],
        makoto: [
            "S4 ตอนที่ 163: คดีหน้าร้อนอันตรายของโซโนโกะ", "S10 ตอนที่ 504: มาโคโตะปะทะคาราเต้", "S16 ตอนที่ 776: คิดปะทะมาโคโตะ", "S21 ตอนที่ 1044: มาโคโตะผู้ตกอยู่ในอันตราย"
        ]
    };

    let history = JSON.parse(localStorage.getItem('conan_slot_v3')) || [];
    let currentResultHTML = "";

    function isDuplicate(text) {
        const cleanTarget = text.replace(/<[^>]*>?/gm, '').trim();
        return history.some(item => item.text.replace(/<[^>]*>?/gm, '').trim() === cleanTarget);
    }

    function startSpin(fn) {
        const wrapper = document.getElementById('slotWrapper');
        const canSpin = fn(); 
        if (canSpin === false) return;

        document.getElementById('doorSystem').classList.add('active');
        setTimeout(() => {
            const dummyItems = ["Detective Conan", "Searching...", "Found Evidence", "S1-S19 iQIYI", "S20-S25 True"];
            let content = "";
            dummyItems.forEach(item => content += `<div class="slot-item">${item}</div>`);
            content += `<div class="slot-item">${currentResultHTML}</div>`;
            
            wrapper.innerHTML = content;
            wrapper.style.transition = "none";
            wrapper.style.transform = "translateY(0)";
            wrapper.offsetHeight;
            
            wrapper.style.transition = "transform 1.5s cubic-bezier(0.23, 1, 0.32, 1)";
            wrapper.style.transform = `translateY(-${dummyItems.length * 120}px)`;
            
            document.getElementById('doorSystem').classList.remove('active');
            document.getElementById('badge').classList.add('show');
        }, 500);
    }

    function spinSeries() {
        startSpin(() => {
            let res = "", platform = "", retry = 0, found = false;
            while (retry < 2000) {
                const ep = Math.floor(Math.random() * 1280) + 1; // สุ่มได้ถึงตอนปัจจุบัน
                let s = Math.ceil(ep / 52); 
                if (s > 25) s = 25;

                if (ep <= 993) {
                    platform = "iQIYI (S1-19)";
                    res = `ซีซั่น ${s} ตอนที่ ${ep} [iQIYI]`;
                } else {
                    platform = "TrueVisions (S20-25)";
                    res = `ซีซั่น ${s} ตอนที่ ${ep} [TrueVisions]`;
                }

                if (!isDuplicate(res)) { found = true; break; }
                retry++;
            }
            if (!found) { alert("สุ่มจนครบ 1200+ ตอนแล้วจ้า Ayu! ล้างประวัติก่อนนะ"); return false; }
            currentResultHTML = res;
            updateBadge(platform); addH(res);
            return true;
        });
    }

    function spinChar() {
        startSpin(() => {
            const c = document.getElementById('charSelect').value;
            const available = charData[c].filter(p => !isDuplicate(p));
            if (available.length === 0) { alert("ดูตอนของตัวละครนี้ครบหมดแล้ว!"); return false; }
            
            let rawRes = available[Math.floor(Math.random() * available.length)];
            let platform = rawRes.includes("S20") || rawRes.includes("S21") || rawRes.includes("S22") || rawRes.includes("S23") || rawRes.includes("S24") || rawRes.includes("S25") ? "TrueVisions" : "iQIYI";
            
            let resWithPlat = `${rawRes} [${platform}]`;
            currentResultHTML = `${rawRes.split(': ')[0]} <span>${rawRes.split(': ')[1]} [${platform}]</span>`;
            updateBadge(`ตัวละคร: ${c}`); addH(resWithPlat);
            return true;
        });
    }

    function spinMovie() {
        startSpin(() => {
            const available = movieNames.map((n, i) => `Movie ${i+1}: ${n}`).filter(m => !isDuplicate(m));
            if (available.length === 0) { alert("ดูมูฟวี่ครบหมดทุกภาคแล้ว!"); return false; }
            let res = available[Math.floor(Math.random() * available.length)];
            currentResultHTML = `Movie ${res.split(': ')[0].split(' ')[1]} <span>${res.split(': ')[1]}</span>`;
            updateBadge("เดอะมูฟวี่"); addH(res);
            return true;
        });
    }

    function spinLupin() {
        startSpin(() => {
            const pool = ["Lupin III vs Conan (TV Special 2009)", "Lupin III vs Conan (The Movie 2013)"];
            const available = pool.filter(p => !isDuplicate(p));
            if (available.length === 0) { alert("ดูการปะทะลูแปงครบแล้ว!"); return false; }
            let res = available[Math.floor(Math.random() * available.length)];
            currentResultHTML = res; updateBadge("ตอนพิเศษ"); addH(res);
            return true;
        });
    }

    function spinEverything() {
        const r = Math.random();
        if (r < 0.6) spinSeries(); else if (r < 0.85) spinMovie(); else spinChar();
    }

    function updateBadge(b) { document.getElementById('badge').innerHTML = b; }
    function addH(t) { 
        const cleanText = t.replace(/<[^>]*>?/gm, '').trim();
        history.unshift({ id: Date.now(), text: cleanText, checked: false }); 
        save(); 
    }
    function save() {
        localStorage.setItem('conan_slot_v3', JSON.stringify(history));
        const l = document.getElementById('historyList');
        if(!history.length) { l.innerHTML = '<div style="text-align:center; padding:10px; color:#555;">ไม่มีประวัติ</div>'; return; }
        l.innerHTML = history.map(h => `<div class="history-item ${h.checked ? 'checked' : ''}" onclick="toggleC(${h.id})"><span>${h.text}</span><div><span class="btn-del" onclick="delI(${h.id}, event)">🗑️</span></div></div>`).join('');
    }
    function toggleC(id) { const i = history.find(h => h.id === id); if(i) i.checked = !i.checked; save(); }
    function delI(id, e) { e.stopPropagation(); history = history.filter(h => h.id !== id); save(); }
    function clearAllHistory() { if(confirm("ล้างประวัติทั้งหมด?")) { history = []; save(); } }
    function toggleUIPanel() { document.getElementById('uiPanel').classList.toggle('active'); }
    function updateTheme(color) { document.documentElement.style.setProperty('--conan-gold', color); }
    function updateRadius(val) { document.documentElement.style.setProperty('--btn-radius', val + 'px'); }
    function closeModal() { document.getElementById('updateModal').style.display = 'none'; }
    
    save();
</script>
</body>
</html>
